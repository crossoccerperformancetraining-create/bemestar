<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProCoach V110 - Perfect Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { background-color: #f8fafc; color: #0f172a; font-family: sans-serif; overflow: hidden; }
        body.dark { background-color: #0f172a; color: #f8fafc; }
        .gauge-container { width: 220px; height: 110px; overflow: hidden; position: relative; margin: 0 auto; }
        .gauge-needle { width: 4px; height: 100px; background: #475569; position: absolute; left: 108px; top: 10px; transform-origin: bottom center; transition: transform 0.8s ease-out; border-radius: 2px; }
        .dark .gauge-needle { background: #e2e8f0; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="h-screen w-screen flex flex-col">
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, set, onValue, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAqx0MYZ_QuDQFIkBqSGG17p_OUzTI-Bkw",
            authDomain: "bem-estar-aee29.firebaseapp.com",
            databaseURL: "https://bem-estar-aee29-default-rtdb.firebaseio.com",
            projectId: "bem-estar-aee29",
            storageBucket: "bem-estar-aee29.firebasestorage.app",
            messagingSenderId: "672641883545",
            appId: "1:672641883545:web:2d32126563816d139ac708"
        };
        const app = initializeApp(firebaseConfig);
        window.fbAuth = getAuth(app);
        window.fbDb = getDatabase(app);
        window.fbMethods = { signInWithEmailAndPassword, onAuthStateChanged, signOut, ref, set, onValue, serverTimestamp };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- COMPONENTE GAUGE ---
        const Speedometer = ({ value }) => {
            const angle = ((Math.max(5, Math.min(35, value)) - 5) / (30)) * 180 - 90;
            return (
                <div className="gauge-container">
                    <svg viewBox="0 0 200 100" className="w-full h-full">
                        <path d="M20 100 A80 80 0 0 1 180 100" fill="none" stroke="#e2e8f0" strokeWidth="20"/>
                        <path d="M20 100 A80 80 0 0 1 73 36" fill="none" stroke="#ef4444" strokeWidth="20"/>
                        <path d="M73 36 A80 80 0 0 1 127 36" fill="none" stroke="#eab308" strokeWidth="20"/>
                        <path d="M127 36 A80 80 0 0 1 180 100" fill="none" stroke="#22c55e" strokeWidth="20"/>
                    </svg>
                    <div className="gauge-needle" style={{ transform: `rotate(${angle}deg)` }}></div>
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [tab, setTab] = useState('match');
            const [firebaseData, setFirebaseData] = useState({});
            const [players, setPlayers] = useState([{name: "Atleta Teste", email: "atleta@teste.com"}]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const check = setInterval(() => {
                    if (window.fbMethods?.onAuthStateChanged) {
                        window.fbMethods.onAuthStateChanged(window.fbAuth, u => {
                            setUser(u);
                            setLoading(false);
                            if (u) {
                                const today = new Date().toISOString().split('T')[0];
                                const dbRef = window.fbMethods.ref(window.fbDb, `checkins/${today}`);
                                window.fbMethods.onValue(dbRef, snap => setFirebaseData(snap.val() || {}));
                            }
                        });
                        clearInterval(check);
                    }
                }, 500);
            }, []);

            if (loading) return <div className="h-screen flex items-center justify-center font-bold">CARREGANDO SISTEMA...</div>;

            if (!user) return (
                <div className="h-screen flex items-center justify-center bg-slate-900">
                    <div className="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-sm text-center">
                        <h2 className="text-2xl font-black mb-6 italic text-blue-600">PROCOACH V110</h2>
                        <button onClick={() => {
                            const email = prompt("E-mail:");
                            const pass = prompt("Senha:");
                            window.fbMethods.signInWithEmailAndPassword(window.fbAuth, email, pass).catch(e => alert("Dados Incorretos!"));
                        }} className="bg-blue-600 text-white w-full py-4 rounded-xl font-bold uppercase tracking-widest">Acessar Painel</button>
                    </div>
                </div>
            );

            const teamWellnessAvg = Object.values(firebaseData).length > 0 
                ? Math.round(Object.values(firebaseData).reduce((a, b) => a + Object.values(b.wellness || {}).reduce((x,y)=>x+y,0), 0) / Object.values(firebaseData).length)
                : 5;

            return (
                <div className="flex flex-col h-full bg-slate-50 dark:bg-slate-900 transition-colors">
                    {/* Header */}
                    <div className="bg-white dark:bg-slate-800 border-b p-3 flex justify-between items-center shadow-sm">
                        <div className="font-black text-xl italic text-blue-600 uppercase tracking-tighter">ProCoach <span className="text-slate-800 dark:text-white">V110</span></div>
                        <div className="flex items-center gap-4">
                            <span className="bg-green-100 text-green-700 text-[9px] font-black px-2 py-1 rounded uppercase">Dashboard Ativo</span>
                            <button onClick={() => window.fbMethods.signOut(window.fbAuth)} className="text-red-500 font-bold text-xs uppercase">Sair</button>
                        </div>
                    </div>

                    {/* Menu de Abas Robustas */}
                    <div className="flex bg-slate-200 dark:bg-slate-800 p-1 gap-1 overflow-x-auto">
                        {['MATCH', 'WELLNESS', 'PSE', 'ELENCO', 'DM', 'AVALIAÇÃO', 'MICROCICLO'].map(t => (
                            <button key={t} onClick={() => setTab(t.toLowerCase())} 
                                className={`px-5 py-2.5 rounded-lg text-[10px] font-black transition-all shrink-0 ${tab === t.toLowerCase() ? 'bg-white shadow text-blue-600' : 'text-slate-500'}`}>{t}</button>
                        ))}
                    </div>

                    {/* Conteúdo das Abas */}
                    <div className="flex-1 overflow-y-auto p-6 custom-scroll">
                        {tab === 'match' && (
                            <div className="space-y-6">
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                    <div className="bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-sm border text-center">
                                        <h3 className="text-[10px] font-bold text-slate-400 uppercase mb-4 tracking-widest">Prontidão Equipe</h3>
                                        <Speedometer value={teamWellnessAvg} />
                                        <div className="text-3xl font-black mt-2 text-slate-700 dark:text-white">{teamWellnessAvg}</div>
                                    </div>
                                    <div className="md:col-span-2 bg-slate-800 text-white p-8 rounded-2xl flex flex-col justify-center shadow-xl">
                                        <h2 className="text-xl font-bold mb-3 italic uppercase text-blue-400 tracking-tighter">Relatório Inteligente (Hoje)</h2>
                                        <p className="text-sm opacity-90 leading-relaxed">
                                            {teamWellnessAvg > 25 ? "ALERTA: Fadiga alta detectada no elenco. Ajuste o Microciclo para cargas regenerativas." : "EQUIPE APTA: Bons níveis de prontidão. Treino de alta intensidade liberado para o grupo."}
                                        </p>
                                    </div>
                                </div>

                                <div className="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border overflow-hidden">
                                    <table className="w-full text-left text-sm">
                                        <thead className="bg-slate-50 dark:bg-slate-700 font-bold uppercase text-[9px] text-slate-500">
                                            <tr><th className="p-4">Atleta</th><th className="p-4">Wellness Total</th><th className="p-4">Dores Relatadas</th></tr>
                                        </thead>
                                        <tbody>
                                            {Object.entries(firebaseData).map(([uid, data]) => {
                                                const total = Object.values(data.wellness || {}).reduce((a,b)=>a+b,0);
                                                return (
                                                    <tr key={uid} className="border-t dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-700/50">
                                                        <td className="p-4 font-bold dark:text-white uppercase text-xs">{data.atleta}</td>
                                                        <td className="p-4">
                                                            <span className={`px-3 py-1 rounded-full font-black text-[10px] ${total > 25 ? 'bg-red-100 text-red-600' : 'bg-green-100 text-green-600'}`}>{total} / 35</span>
                                                        </td>
                                                        <td className="p-4 text-red-500 font-bold text-[10px] uppercase">{data.dores?.join(', ') || 'Nenhuma'}</td>
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {tab === 'wellness' && (
                            <div className="bg-white dark:bg-slate-800 p-8 rounded-2xl shadow border">
                                <h2 className="text-xl font-bold mb-6 text-blue-600 italic uppercase tracking-tighter">Aba Wellness Integrada</h2>
                                <p className="text-slate-500 text-sm mb-4">Os dados abaixo são sincronizados automaticamente com os check-ins dos atletas.</p>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    {Object.entries(firebaseData).map(([uid, data]) => (
                                        <div key={uid} className="bg-slate-50 dark:bg-slate-700 p-4 rounded-xl border">
                                            <div className="font-bold mb-2 uppercase text-xs">{data.atleta}</div>
                                            <div className="space-y-1">
                                                {Object.entries(data.wellness || {}).map(([metric, val]) => (
                                                    <div key={metric} className="flex justify-between text-[10px] uppercase">
                                                        <span>{metric}</span><span className="font-bold text-blue-500">{val}</span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {tab === 'avaliação' && (
                            <div className="bg-white dark:bg-slate-800 p-8 rounded-2xl shadow border">
                                <h2 className="text-xl font-bold mb-4 text-blue-600 uppercase italic">Avaliação Física V110</h2>
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                                    {['Peso (kg)', 'Altura (cm)', '% Gordura', 'Soccer Test'].map(item => (
                                        <div key={item} className="bg-slate-100 dark:bg-slate-700 p-4 rounded-xl">
                                            <div className="text-[10px] font-bold text-slate-400 uppercase">{item}</div>
                                            <div className="text-xl font-black">--</div>
                                        </div>
                                    ))}
                                </div>
                                <button className="bg-blue-600 text-white px-6 py-3 rounded-xl font-bold text-xs uppercase tracking-widest shadow-lg">Nova Avaliação</button>
                            </div>
                        )}
                        
                        {(tab !== 'match' && tab !== 'wellness' && tab !== 'avaliação') && (
                            <div className="text-center py-20 text-slate-400 font-bold uppercase italic tracking-widest border-2 border-dashed rounded-3xl">Aba {tab} pronta para recebimento de dados</div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
