<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProCoach V110 - Perfect Edition (INTEGRADO)</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', }
    </script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        body { overscroll-behavior-y: contain; touch-action: pan-x pan-y; background-color: #f8fafc; color: #0f172a; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; -webkit-tap-highlight-color: transparent; transition: background-color 0.3s, color 0.3s; }
        body.dark { background-color: #0f172a; color: #f8fafc; }
        /* Seus estilos originais mantidos... */
        .gauge-container { width: 220px; height: 110px; overflow: hidden; position: relative; margin: 0 auto; }
        .gauge-needle { width: 4px; height: 100px; background: #475569; position: absolute; left: 108px; top: 10px; transform-origin: bottom center; transition: transform 0.5s cubic-bezier(0.4, 2.08, 0.55, 0.44); border-radius: 2px; z-index: 10; }
        .mini-gauge-container { width: 80px; height: 40px; overflow: hidden; position: relative; }
        .mini-gauge-needle { width: 2px; height: 35px; background: #334155; position: absolute; left: 39px; top: 5px; transform-origin: bottom center; transition: transform 0.5s ease-out; border-radius: 1px; z-index: 10; }
    </style>
</head>
<body class="h-screen w-screen overflow-hidden flex flex-col safe-area-inset">
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, set, onValue, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAqx0MYZ_QuDQFIkBqSGG17p_OUzTI-Bkw",
            authDomain: "bem-estar-aee29.firebaseapp.com",
            databaseURL: "https://bem-estar-aee29-default-rtdb.firebaseio.com",
            projectId: "bem-estar-aee29",
            storageBucket: "bem-estar-aee29.firebasestorage.app",
            messagingSenderId: "672641883545",
            appId: "1:672641883545:web:2d32126563816d139ac708"
        };

        const app = initializeApp(firebaseConfig);
        window.fbAuth = getAuth(app);
        window.fbDb = getDatabase(app);
        window.fbMethods = { signInWithEmailAndPassword, onAuthStateChanged, signOut, ref, set, onValue, serverTimestamp };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- COMPONENTES VISUAIS (GAUGES) ---
        const SpeedometerGauge = ({ value }) => {
            const min=5, max=35; const normalized=Math.max(min, Math.min(max, value));
            const angle=((normalized-min)/(max-min))*180-90;
            return (
                <div className="flex flex-col items-center">
                    <div className="gauge-container">
                        <svg viewBox="0 0 200 100" className="w-full h-full">
                            <path d="M20 100 A80 80 0 0 1 180 100" fill="none" stroke="#e2e8f0" strokeWidth="20"/>
                            <path d="M20 100 A80 80 0 0 1 73 36" fill="none" stroke="#ef4444" strokeWidth="20"/>
                            <path d="M73 36 A80 80 0 0 1 127 36" fill="none" stroke="#eab308" strokeWidth="20"/>
                            <path d="M127 36 A80 80 0 0 1 180 100" fill="none" stroke="#22c55e" strokeWidth="20"/>
                        </svg>
                        <div className="gauge-needle" style={{transform:`rotate(${angle}deg)`}}></div>
                    </div>
                    <div className="text-3xl font-black -mt-4 dark:text-white">{value}</div>
                    <div className="text-[10px] font-bold uppercase text-slate-400">Prontidão Equipe</div>
                </div>
            );
        };

        // --- APP PRINCIPAL ---
        const App = () => {
            const [user, setUser] = useState(null);
            const [tab, setTab] = useState('match');
            const [players, setPlayers] = useState([{name: "Jogador 1", email: "atleta1@teste.com"}]);
            const [trainingLog, setTrainingLog] = useState({});
            const [loading, setLoading] = useState(true);

            // SINCRONIZAÇÃO EM TEMPO REAL COM FIREBASE
            useEffect(() => {
                const checkAuth = setInterval(() => {
                    if (window.fbMethods?.onAuthStateChanged) {
                        window.fbMethods.onAuthStateChanged(window.fbAuth, (u) => {
                            setUser(u);
                            setLoading(false);
                            if (u) {
                                // Escuta os check-ins do dia
                                const today = new Date().toISOString().split('T')[0];
                                const dbRef = window.fbMethods.ref(window.fbDb, `checkins/${today}`);
                                window.fbMethods.onValue(dbRef, (snapshot) => {
                                    const data = snapshot.val();
                                    if (data) {
                                        // Converte os dados do Firebase para o formato do seu Dashboard
                                        setTrainingLog(prev => ({ ...prev, [today]: data }));
                                    }
                                });
                            }
                        });
                        clearInterval(checkAuth);
                    }
                }, 500);
            }, []);

            if (loading) return <div className="h-screen flex items-center justify-center">Integrando Firebase...</div>;

            if (!user) return (
                <div className="h-screen flex items-center justify-center bg-slate-900">
                    <div className="bg-white p-8 rounded-2xl shadow-2xl w-80 text-center">
                        <h2 className="text-2xl font-black mb-6">PROCOACH LOGIN</h2>
                        <button onClick={() => {
                            const email = prompt("Seu e-mail:");
                            const pass = prompt("Sua senha:");
                            window.fbMethods.signInWithEmailAndPassword(window.fbAuth, email, pass);
                        }} className="bg-blue-600 text-white w-full py-3 rounded-lg font-bold">ENTRAR NO SISTEMA</button>
                    </div>
                </div>
            );

            const today = new Date().toISOString().split('T')[0];
            const dailyData = trainingLog[today] || {};
            
            // Cálculo de média para o Speedometer
            const wellnessScores = Object.values(dailyData).map(d => 
                Object.values(d.wellness || {}).reduce((a,b)=>a+b, 0)
            ).filter(v => v > 0);
            
            const teamAvg = wellnessScores.length > 0 
                ? Math.round(wellnessScores.reduce((a,b)=>a+b,0) / wellnessScores.length) 
                : 0;

            return (
                <div className="flex flex-col h-full bg-slate-100 dark:bg-slate-900 transition-colors">
                    {/* Cabeçalho */}
                    <div className="bg-white dark:bg-slate-800 border-b p-4 flex justify-between items-center">
                        <div className="font-black text-xl italic">PROCOACH <span className="text-blue-600">V110</span></div>
                        <div className="flex gap-4">
                            <span className="text-xs font-bold text-green-500 uppercase">● Online: {user.email}</span>
                            <button onClick={() => window.fbMethods.signOut(window.fbAuth)} className="text-xs text-red-500 font-bold">SAIR</button>
                        </div>
                    </div>

                    {/* Tabs do seu projeto robusto */}
                    <div className="flex bg-slate-200 dark:bg-slate-800 p-1 gap-1 overflow-x-auto">
                        {['MATCH', 'WELLNESS', 'PSE', 'ELENCO', 'DM'].map(t => (
                            <button key={t} onClick={() => setTab(t.toLowerCase())} 
                                className={`px-4 py-2 rounded text-xs font-bold ${tab === t.toLowerCase() ? 'bg-white shadow' : 'text-slate-500'}`}>{t}</button>
                        ))}
                    </div>

                    {/* Conteúdo: Aba MATCH (Exemplo com Speedometer Real) */}
                    {tab === 'match' && (
                        <div className="p-6 overflow-y-auto">
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                <div className="bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-sm border border-slate-200 text-center">
                                    <SpeedometerGauge value={teamAvg} />
                                    <p className="mt-4 text-xs text-slate-400 font-bold italic">Baseado em {wellnessScores.length} check-ins hoje</p>
                                </div>
                                
                                <div className="md:col-span-2 bg-slate-800 text-white p-6 rounded-2xl flex flex-col justify-center">
                                    <h3 className="text-xl font-bold mb-2">Relatório de Inteligência</h3>
                                    <p className="text-sm opacity-80">
                                        {teamAvg > 25 ? "Alerta: Elenco com fadiga acumulada. Reduza o volume do treino de hoje." : "Condição estável: Elenco apto para treinos de alta intensidade."}
                                    </p>
                                </div>
                            </div>

                            {/* Tabela de atletas com dados que chegaram do Firebase */}
                            <div className="mt-8 bg-white dark:bg-slate-800 rounded-2xl shadow-sm overflow-hidden">
                                <table className="w-full text-left text-sm">
                                    <thead className="bg-slate-50 dark:bg-slate-700 font-bold uppercase text-[10px]">
                                        <tr>
                                            <th className="p-4">Atleta</th>
                                            <th className="p-4">Status</th>
                                            <th className="p-4">Dores</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {Object.entries(dailyData).map(([uid, data]) => (
                                            <tr key={uid} className="border-t dark:border-slate-700">
                                                <td className="p-4 font-bold">{data.atleta}</td>
                                                <td className="p-4">
                                                    <span className={`px-2 py-1 rounded-full text-[10px] font-bold ${Object.values(data.wellness || {}).reduce((a,b)=>a+b,0) > 25 ? 'bg-red-100 text-red-600' : 'bg-green-100 text-green-600'}`}>
                                                        WELLNESS: {Object.values(data.wellness || {}).reduce((a,b)=>a+b,0)}
                                                    </span>
                                                </td>
                                                <td className="p-4 text-red-500 font-bold text-xs">{data.dores?.join(', ') || 'Nenhuma'}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
