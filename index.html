<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProCoach V110 - Sistema de Gestão AC Nova Geração</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <style>
        body { background-color: #f1f5f9; font-family: 'Inter', sans-serif; overflow: hidden; }
        .tab-active { border-bottom: 4px solid #2563eb; color: #2563eb; font-weight: 900; }
        .card-glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid #e2e8f0; }
        .gauge-container { width: 240px; height: 120px; position: relative; margin: 0 auto; overflow: hidden; }
        .needle { width: 4px; height: 100px; background: #334155; position: absolute; left: 118px; top: 20px; transform-origin: bottom center; transition: all 1s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    </style>
</head>
<body class="h-screen w-screen flex flex-col">
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, set, onValue, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAqx0MYZ_QuDQFIkBqSGG17p_OUzTI-Bkw",
            authDomain: "bem-estar-aee29.firebaseapp.com",
            databaseURL: "https://bem-estar-aee29-default-rtdb.firebaseio.com",
            projectId: "bem-estar-aee29",
            storageBucket: "bem-estar-aee29.firebasestorage.app",
            messagingSenderId: "672641883545",
            appId: "1:672641883545:web:2d32126563816d139ac708"
        };
        const app = initializeApp(firebaseConfig);
        window.fb = { auth: getAuth(app), db: getDatabase(app), methods: { signInWithEmailAndPassword, onAuthStateChanged, signOut, ref, set, onValue, push } };
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [user, setUser] = useState(null);
            const [tab, setTab] = useState('match');
            const [dailyData, setDailyData] = useState({});
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const interval = setInterval(() => {
                    if (window.fb?.methods) {
                        window.fb.methods.onAuthStateChanged(window.fb.auth, u => {
                            setUser(u);
                            setLoading(false);
                            if (u) {
                                const today = new Date().toISOString().split('T')[0];
                                const path = window.fb.methods.ref(window.fb.db, `checkins/${today}`);
                                window.fb.methods.onValue(path, s => setDailyData(s.val() || {}));
                            }
                        });
                        clearInterval(interval);
                    }
                }, 500);
            }, []);

            if (loading) return <div className="h-screen flex items-center justify-center font-black animate-pulse">SINCRONIZANDO NUVEM...</div>;

            if (!user) return (
                <div className="h-screen flex items-center justify-center bg-slate-900 px-4">
                    <div className="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm text-center">
                        <h1 className="text-3xl font-black italic mb-6 text-blue-600">PROCOACH <span className="text-slate-800">V110</span></h1>
                        <button onClick={() => {
                            const e = prompt("E-mail do Treinador:");
                            const p = prompt("Senha:");
                            window.fb.methods.signInWithEmailAndPassword(window.fb.auth, e, p).catch(() => alert("Acesso Negado"));
                        }} className="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold uppercase tracking-widest hover:bg-blue-700 transition-all">Entrar no Sistema</button>
                    </div>
                </div>
            );

            // Cálculos Automáticos
            const responses = Object.values(dailyData);
            const avgWellness = responses.length > 0 
                ? Math.round(responses.reduce((acc, curr) => acc + Object.values(curr.wellness || {}).reduce((a, b) => a + b, 0), 0) / responses.length)
                : 5;

            return (
                <div className="flex flex-col h-full overflow-hidden bg-slate-50">
                    {/* Top Bar Profissional */}
                    <div className="bg-white border-b p-4 flex justify-between items-center px-6">
                        <div>
                            <div className="text-[10px] font-black text-blue-500 uppercase tracking-widest">Projeto Social</div>
                            <div className="text-xl font-black italic text-slate-800">AC NOVA GERAÇÃO <span className="text-blue-600">ALAGOANA</span></div>
                        </div>
                        <button onClick={() => window.fb.methods.signOut(window.fb.auth)} className="bg-red-50 text-red-500 px-4 py-2 rounded-xl text-xs font-bold border border-red-100 uppercase">Sair</button>
                    </div>

                    {/* Menu de Abas Robustas */}
                    <div className="flex bg-white border-b overflow-x-auto no-scrollbar">
                        {['MATCH', 'WELLNESS', 'PSE', 'AVALIAÇÃO', 'MICROCICLO', 'DM'].map(t => (
                            <button key={t} onClick={() => setTab(t.toLowerCase())} 
                                className={`px-8 py-4 text-[11px] font-black transition-all shrink-0 ${tab === t.toLowerCase() ? 'tab-active' : 'text-slate-400'}`}>{t}</button>
                        ))}
                    </div>

                    {/* Conteúdo Dinâmico */}
                    <div className="flex-1 overflow-y-auto p-6 custom-scroll">
                        {tab === 'match' && (
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                <div className="card-glass p-8 rounded-3xl text-center shadow-sm">
                                    <h3 className="text-[10px] font-black text-slate-400 uppercase mb-6 tracking-[0.2em]">Prontidão Geral</h3>
                                    <div className="gauge-container">
                                        <svg viewBox="0 0 200 100" className="w-full h-full">
                                            <path d="M20 100 A80 80 0 0 1 180 100" fill="none" stroke="#f1f5f9" strokeWidth="20"/>
                                            <path d="M20 100 A80 80 0 0 1 73 36" fill="none" stroke="#ef4444" strokeWidth="20"/>
                                            <path d="M73 36 A80 80 0 0 1 127 36" fill="none" stroke="#eab308" strokeWidth="20"/>
                                            <path d="M127 36 A80 80 0 0 1 180 100" fill="none" stroke="#22c55e" strokeWidth="20"/>
                                        </svg>
                                        <div className="needle" style={{ transform: `rotate(${((avgWellness-5)/30)*180 - 90}deg)` }}></div>
                                    </div>
                                    <div className="text-4xl font-black text-slate-800 mt-4">{avgWellness} <span className="text-sm text-slate-400">pts</span></div>
                                </div>

                                <div className="lg:col-span-2 bg-slate-900 rounded-3xl p-8 text-white shadow-xl relative overflow-hidden flex flex-col justify-center">
                                    <div className="relative z-10">
                                        <h2 className="text-2xl font-bold italic mb-4 text-blue-400 uppercase tracking-tighter">Status do Elenco</h2>
                                        <p className="text-lg opacity-90 leading-relaxed font-medium">
                                            {avgWellness > 25 ? "🚨 ALERTA: Fadiga alta! Considere um treino regenerativo para prevenir lesões." : "✅ PRONTO: Níveis ideais de recuperação. Carga de treino liberada."}
                                        </p>
                                        <div className="mt-6 flex gap-3 text-[10px] font-bold">
                                            <span className="bg-blue-500/20 text-blue-300 px-3 py-1 rounded-full border border-blue-500/30 uppercase">Atletas Ativos: {responses.length}</span>
                                            <span className="bg-green-500/20 text-green-300 px-3 py-1 rounded-full border border-green-500/30 uppercase">Segurança: Alta</span>
                                        </div>
                                    </div>
                                </div>

                                <div className="lg:col-span-3 bg-white rounded-3xl border shadow-sm overflow-hidden">
                                    <table className="w-full text-left text-sm">
                                        <thead className="bg-slate-50 font-black text-[9px] uppercase text-slate-500 border-b">
                                            <tr><th className="p-5">Atleta</th><th className="p-5">Wellness</th><th className="p-5">Zonas de Dor</th><th className="p-5">Status</th></tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {responses.map((data, i) => {
                                                const total = Object.values(data.wellness || {}).reduce((a,b)=>a+b,0);
                                                return (
                                                    <tr key={i} className="hover:bg-slate-50/50 transition-colors">
                                                        <td className="p-5 font-black text-slate-700 uppercase">{data.atleta}</td>
                                                        <td className="p-5 font-bold text-blue-600">{total} / 35</td>
                                                        <td className="p-5 text-red-500 font-bold text-[10px] uppercase">{data.dores?.join(', ') || 'Nenhuma'}</td>
                                                        <td className="p-5 text-[10px]">
                                                            <span className={`px-3 py-1 rounded-full font-black uppercase ${total > 25 ? 'bg-red-100 text-red-600' : 'bg-green-100 text-green-600'}`}>
                                                                {total > 25 ? 'Cuidado' : 'Liberado'}
                                                            </span>
                                                        </td>
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {tab === 'avaliação' && (
                            <div className="bg-white p-10 rounded-3xl border shadow-sm">
                                <div className="flex justify-between items-center mb-10">
                                    <h2 className="text-2xl font-black italic text-slate-800 uppercase tracking-tighter">Protocolo de Avaliação Física</h2>
                                    <button className="bg-blue-600 text-white px-8 py-3 rounded-2xl font-bold text-xs uppercase shadow-lg shadow-blue-200">Salvar Nova Medição</button>
                                </div>
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-6">
                                    {['Peso Atual', 'Estatura', '% de Gordura', 'Soccer Test'].map(m => (
                                        <div key={m} className="bg-slate-50 p-6 rounded-2xl border border-slate-100">
                                            <div className="text-[10px] font-black text-slate-400 uppercase mb-2">{m}</div>
                                            <input type="text" placeholder="--" className="bg-transparent text-xl font-black text-slate-800 focus:outline-none w-full" />
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {tab === 'microciclo' && (
                            <div className="bg-white p-8 rounded-3xl border shadow-sm overflow-x-auto">
                                <h2 className="text-2xl font-black italic mb-8 uppercase text-slate-800">Planejamento Semanal</h2>
                                <table className="w-full border-collapse">
                                    <thead>
                                        <tr>
                                            {['SEG', 'TER', 'QUA', 'QUI', 'SEX', 'SAB', 'DOM'].map(d => (
                                                <th key={d} className="p-4 border bg-slate-50 text-[10px] font-black">{d}</th>
                                            ))}
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr>
                                            {[1,2,3,4,5,6,7].map(i => (
                                                <td key={i} className="p-4 border h-32 vertical-top">
                                                    <textarea className="w-full h-full text-[10px] border-none focus:ring-0 resize-none bg-transparent" placeholder="Conteúdo do treino..."></textarea>
                                                </td>
                                            ))}
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        )}

                        {(tab !== 'match' && tab !== 'avaliação' && tab !== 'microciclo') && (
                            <div className="flex items-center justify-center py-40 border-4 border-dashed rounded-3xl text-slate-300 font-black text-2xl uppercase italic">Aba {tab} pronta para integração de dados</div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
